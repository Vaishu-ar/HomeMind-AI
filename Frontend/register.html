<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>HomeMind AI</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Top Bar -->
    <div class="top-bar">

        <h3 id="welcomeUser"></h3>

        <button onclick="logout()">🚪 Logout</button>

    </div>

    <!-- Dashboard Title -->
    <h1>🏠 HomeMind AI Dashboard</h1>

    <!-- Device Status -->
    <h3 id="lightStatus">💡 Light : OFF</h3>
    <h3 id="fanStatus">🌀 Fan : OFF</h3>
    <h3 id="acStatus">❄️ AC : OFF</h3>

    <!-- Command History -->
    <h2>📜 Command History</h2>
    <div id="history"></div>

    <!-- Live Clock -->
    <h2>🕒 Current Time</h2>
    <h3 id="clock"></h3>

    <!-- Default Device Controls -->
    <div class="container">

        <button onclick="lightOn()">💡 Light ON</button>
        <button onclick="lightOff()">💡 Light OFF</button>

        <button onclick="fanOn()">🌀 Fan ON</button>
        <button onclick="fanOff()">🌀 Fan OFF</button>

        <button onclick="acOn()">❄️ AC ON</button>
        <button onclick="acOff()">❄️ AC OFF</button>

    </div>

    <br>

    <!-- Voice Command -->
    <button onclick="startVoice()">🎤 Start Voice Command</button>

    <hr>

    <!-- Device Management -->
    <h2>➕ Device Management</h2>

    <div class="device-form">

        <input
            type="text"
            id="deviceName"
            placeholder="Enter Device Name">

        <select id="deviceStatus">

            <option value="ON">ON</option>
            <option value="OFF">OFF</option>

        </select>

        <button onclick="addDevice()">
            ➕ Add Device
        </button>

    </div>

    <!-- Device Table -->
    <table id="deviceTable">

        <tr>

            <th>Device Name</th>
            <th>Status</th>
            <th>Action</th>

        </tr>

    </table>

    <br>

    <!-- Dynamic Devices -->
    <h2>📱 Added Smart Devices</h2>

    <div id="dynamicDevices"></div>

    <script src="script.js"></script>

</body>

</html>
